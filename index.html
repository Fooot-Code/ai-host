<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ollama Network Chat</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 90%;
        max-width: 900px;
        background: rgba(15, 23, 42, 0.9);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
        height: 90vh;
    }

    h1 {
        margin: 0 0 10px;
        font-size: 20px;
        text-align: center;
        color: #60a5fa;
    }

    .settings {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

    input, textarea, button {
        border-radius: 10px;
        border: none;
        padding: 10px;
        font-size: 14px;
    }

    input {
        flex: 1;
        background: #1e293b;
        color: white;
    }

    textarea {
    width: 100%;
    height: 80px;
    resize: none;
    background: #0f172a;
    color: white;
    margin-bottom: 12px; /* 👈 adds space below textarea */
    }

    .row {
        display: flex;
        gap: 10px;
        margin-top: 8px; /* 👈 pushes buttons down */
        padding-top: 5px;
    }

    button {
        background: #2563eb;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #1d4ed8;
    }

    .chat {
        flex: 1;
        overflow-y: auto;
        background: #0b1220;
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 10px;
    }

    .msg {
        margin: 10px 0;
        padding: 10px;
        border-radius: 10px;
        line-height: 1.4;
        white-space: pre-wrap;
    }

    .user {
        background: #1d4ed8;
        align-self: flex-end;
    }

    .bot {
        background: #334155;
    }

    .status {
        font-size: 12px;
        opacity: 0.7;
        text-align: center;
        margin-top: 5px;
    }
</style>
</head>

<body>
<div class="container">
    <h1>Ollama Network Chat</h1>

    <div class="settings">
        <input id="host" placeholder="Host (e.g. http://192.168.1.50:11434)" />
        <input id="model" placeholder="Model (e.g. mistral)" value="mistral" />
    </div>

    <div class="chat" id="chat"></div>

    <textarea id="prompt" placeholder="Type your message..."></textarea>

    <div class="row">
        <button onclick="sendPrompt()">Send</button>
        <button onclick="clearChat()">Clear</button>
    </div>

    <div class="status" id="status"></div>
</div>

<script>
const chat = document.getElementById("chat");
const statusEl = document.getElementById("status");

function addMessage(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

function clearChat() {
    chat.innerHTML = "";
}

async function sendPrompt() {
    const host = document.getElementById("host").value.trim();
    const model = document.getElementById("model").value.trim();
    const prompt = document.getElementById("prompt").value.trim();

    if (!host || !model || !prompt) {
        alert("Please fill host, model, and prompt.");
        return;
    }

    document.getElementById("prompt").value = "";

    addMessage(prompt, "user");
    const botMsg = addMessage("Thinking...", "bot");

    statusEl.textContent = "Sending request...";

    try {
        // NOTE: This uses Ollama's local HTTP API
        const res = await fetch(`${host}/api/generate`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: model,
                prompt: prompt,
                stream: false
            })
        });

        if (!res.ok) {
            throw new Error("HTTP error " + res.status);
        }

        const data = await res.json();

        // Ollama returns { response: "text" }
        botMsg.textContent = data.response || "(no response)";
        statusEl.textContent = "Done";
    } catch (err) {
        botMsg.textContent = "Error: " + err.message;
        statusEl.textContent = "Failed";
    }
}
</script>

</body>
</html>
