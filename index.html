<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ollama Assignment Helper</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 1100px;
    background: rgba(15, 23, 42, 0.95);
    border-radius: 20px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    padding: 24px;
  }

  h1 {
    margin-top: 0;
    text-align: center;
    color: #60a5fa;
  }

  .subtitle {
    text-align: center;
    opacity: 0.8;
    margin-bottom: 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .panel {
    background: #111827;
    border-radius: 16px;
    padding: 18px;
  }

  label {
    display: block;
    font-size: 14px;
    margin-bottom: 8px;
    font-weight: bold;
  }

  input, textarea, select, button {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
  }

  input, textarea, select {
    background: #1f2937;
    color: white;
    margin-bottom: 14px;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  button {
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }

  button:hover {
    background: #1d4ed8;
  }

  .row {
    display: flex;
    gap: 12px;
    margin-top: 10px;
  }

  .row button {
    flex: 1;
  }

  .output {
    min-height: 500px;
    white-space: pre-wrap;
    line-height: 1.6;
    background: #0b1220;
    border-radius: 14px;
    padding: 18px;
    overflow-y: auto;
  }

  .status {
    margin-top: 12px;
    font-size: 13px;
    opacity: 0.75;
    text-align: center;
  }

  @media (max-width: 900px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="app">
  <h1>Ollama Assignment Helper</h1>
  <div class="subtitle">Provide a topic + rubric and generate a structured assignment draft using your remote Ollama model.</div>

  <div class="grid">
    <div class="panel">
      <label>Ollama Host</label>
      <input id="host" value="http://ai-host.local:11434" />

      <label>Model</label>
      <input id="model" value="mistral:latest" />

      <label>Assignment Topic</label>
      <input id="topic" placeholder="Example: Effects of Social Media on Student Learning" />

      <label>Assignment Type</label>
      <select id="type">
        <option>Essay</option>
        <option>Research Paper</option>
        <option>Discussion Post</option>
        <option>Reflection</option>
        <option>Report</option>
        <option>Presentation Script</option>
      </select>

      <label>Rubric / Instructions</label>
      <textarea id="rubric" placeholder="Paste assignment instructions and grading rubric here..."></textarea>

      <label>Additional Notes (optional)</label>
      <textarea id="notes" placeholder="Tone, required sources, word count, formatting style, etc."></textarea>

      <div class="row">
        <button onclick="generateAssignment()">Generate Assignment</button>
        <button onclick="clearAll()">Clear</button>
      </div>

      <div class="status" id="status">Ready</div>
    </div>

    <div class="panel">
      <label>Generated Output</label>
      <div id="output" class="output">Your generated assignment will appear here.</div>
      <div class="row">
        <button onclick="copyOutput()">Copy Output</button>
      </div>
    </div>
  </div>
</div>

<script>
const allowedPatterns = [".local", "192.168.", "10.", "172."];

function isAllowedHost(host) {
  try {
    const url = new URL(host);
    return allowedPatterns.some(p => url.hostname.includes(p) || url.hostname.startsWith(p));
  } catch {
    return false;
  }
}

function setStatus(message) {
  document.getElementById("status").textContent = message;
}

function clearAll() {
  document.getElementById("topic").value = "";
  document.getElementById("rubric").value = "";
  document.getElementById("notes").value = "";
  document.getElementById("output").textContent = "Your generated assignment will appear here.";
  setStatus("Cleared");
}

function copyOutput() {
  const text = document.getElementById("output").textContent;
  navigator.clipboard.writeText(text);
  setStatus("Copied to clipboard");
}

function buildPrompt() {
  const topic = document.getElementById("topic").value.trim();
  const type = document.getElementById("type").value;
  const rubric = document.getElementById("rubric").value.trim();
  const notes = document.getElementById("notes").value.trim();

  return `You are helping write a strong academic ${type}.\n\nAssignment Topic:\n${topic}\n\nRubric / Instructions:\n${rubric}\n\nAdditional Notes:\n${notes}\n\nPlease complete the full assignment professionally, clearly, and in a way that matches the rubric exactly. Use proper structure, headings when appropriate, and strong academic writing. Do not explain what you are doing—just provide the completed assignment.`;
}

async function generateAssignment() {
  const host = document.getElementById("host").value.trim();
  const model = document.getElementById("model").value.trim();
  const topic = document.getElementById("topic").value.trim();
  const rubric = document.getElementById("rubric").value.trim();
  const output = document.getElementById("output");

  if (!host || !model || !topic || !rubric) {
    alert("Please complete host, model, topic, and rubric.");
    return;
  }

  if (!isAllowedHost(host)) {
    alert("Only local network or .local Ollama hosts are allowed.");
    return;
  }

  const prompt = buildPrompt();
  output.textContent = "Generating assignment...";
  setStatus("Sending request to Ollama...");

  try {
    const response = await fetch(`${host}/api/generate`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model,
        prompt,
        stream: false
      })
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();
    output.textContent = data.response || "No response returned.";
    setStatus("Assignment generated successfully");
  } catch (error) {
    output.textContent = `Error: ${error.message}`;
    setStatus("Request failed");
  }
}
</script>
</body>
</html>
